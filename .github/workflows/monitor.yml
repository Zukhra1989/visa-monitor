name: Visa Monitor

on:
  schedule:
    - cron: '0 * * * *'   # раз в час — внутри скрипт сам крутится 55 минут
  workflow_dispatch:

permissions:
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: bot-state-${{ github.run_id }}
          restore-keys: bot-state-

      - run: npm install

      - run: node visa_monitor.js
        env:
          VISA_EMAIL: ${{ secrets.VISA_EMAIL }}
          VISA_PASSWORD: ${{ secrets.VISA_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: bot-state-${{ github.run_id }}
